<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>My Dream Villa</title>    <script src="./script/aframe.min.js"></script>
    <style>
      canvas { display: block; }
    </style>
  </head>
  <body>

    <a-scene debug>
      <a-assets timeout="30000">
        <!-- Models -->
        <a-asset-item id="Villa" src="./models/home/scene.gltf" response-type="arraybuffer"></a-asset-item>
        <a-asset-item id="Gate" src="./models/gate.glb" response-type="arraybuffer"></a-asset-item>
        <a-asset-item id="Tree" src="./models/tree.glb" response-type="arraybuffer"></a-asset-item>
        <a-asset-item id="SwimmingPool" src="./models/swimming_pool (1)/scene.gltf" response-type="arraybuffer"></a-asset-item>
        <a-asset-item id="Dog" src="./models/doberman_stance_agresive_dogs.glb" response-type="arraybuffer"></a-asset-item>
        <!-- Textures -->
        <img id="grassTexture" src="./textures/grass2.jpeg">
        <img id="skyTexture" src="./textures/sky background.jpg">
        <img src="textures/floor.jpg" alt="" id="floortexture">
        <canvas id="waterCanvas" width="256" height="256"></canvas>
      </a-assets>    
      <a-entity gltf-model="#Villa" position="0 0 0"></a-entity>
      <a-entity gltf-model="#SwimmingPool" position="-10.5 -0.4 0" scale="0.018 0.018 0.018 "></a-entity>
      <a-entity gltf-model="#Fountain" position="2.5 0 5" scale="0.5 0.5 0.5"></a-entity>
    
      <a-entity gltf-model="#Dog" position="3 0 5" scale="0.1 0.1 0.1"></a-entity>
      <a-entity gltf-model="#Gate" position="2.5 -0.5 17" scale="0.35 0.35 0.35"></a-entity>
      <a-entity gltf-model="#Tree" position="-1 0 16" scale="0.2 0.2 0.2"></a-entity>
      <!-- Thick rectangular walls around the house, leaving an opening for the gate -->
      <a-box position="-11 0 2" width="0.4" height="1.5" depth="30" color="#d8d0c4"></a-box>
      <a-box position="15 0 2" width="0.4" height="1.5" depth="30" color="#d8d0c4"></a-box>
      <a-box position="2.5 0 -12" width="27" height="1.5" depth="0.4" color="#d8d0c4"></a-box>
      <a-box position="-7.5 0 17" width="7" height="1.5" depth="0.4" color="#d8d0c4"></a-box>
      <a-box position="12 0 17" width="6" height="1.5" depth="0.4" color="#d8d0c4"></a-box>

      <a-plane position="0 -0.5 0" rotation="-90 0 0" width="100" height="100" material="src:#grassTexture; repeat:10 10"></a-plane>

      <!-- Stone pathway to the gate -->
      <a-plane position="2.5 -0.48 7" rotation="-90 0 0" width="5" height="15" material="src:#floortexture; roughness:1; metalness:0.05" ></a-plane>
      <a-plane position="2.5 -0.47 7" rotation="-90 0 0" width="5.2" height="19.2" material="src:#floortexture; roughness:1; metalness:0.02; opacity:0.9"></a-plane>

      <a-sky material="src:#skyTexture"></a-sky>
      <a-camera position="2 1 20" look-controls></a-camera>
    </a-scene>
  </body>
  </html>
